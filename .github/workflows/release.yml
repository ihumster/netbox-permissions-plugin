name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write       # required to create a GitHub Release
  id-token: write       # required for PyPI Trusted Publishing (OIDC)

env:
  UV_VERSION: "0.4.30"
  FORCE_COLOR: "1"

jobs:
  build:
    name: Build sdist + wheel (uv)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          # No uv.lock in this repo — cache key is pyproject.toml.
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          # tomllib has been stdlib since 3.11; guaranteed on 3.12.
          pkg=$(uv run --python 3.12 --no-project python -c \
            "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag != pyproject.toml version $pkg"
            exit 1
          fi
          echo "Tag and pyproject version match: $tag"

      - name: Build distributions
        # `uv build` produces the same artifacts as `python -m build` but faster.
        run: uv build

      - name: Check distributions with twine
        # `twine check` validates README/metadata; uv has no built-in equivalent yet.
        run: |
          uv tool install twine
          uv tool run twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    name: Attach to GitHub Release
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  pypi-publish:
    # Optional job. Runs only when the repository has vars.PUBLISH_TO_PYPI=true
    # and the PyPI project has a Trusted Publisher configured for this repo
    # (pypi.org project settings -> Publishing -> Add a new publisher).
    name: Publish to PyPI (uv publish)
    needs: [build]
    runs-on: ubuntu-22.04
    environment:
      name: pypi
      url: https://pypi.org/p/netbox-permissions-plugin
    if: ${{ vars.PUBLISH_TO_PYPI == 'true' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Publish via uv (Trusted Publishing OIDC)
        # With PyPI Trusted Publishing, `uv publish` picks up the GitHub OIDC
        # token automatically thanks to the id-token: write permission above.
        run: uv publish dist/*
