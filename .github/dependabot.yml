version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    # Bundle all GitHub Actions bumps into one PR per week so we don't see
    # five separate "bump x from a to b" PRs every Monday.
    groups:
      gha:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    # Group dev-dependency bumps (ruff, pytest, factory-boy, ...) together.
    # If a major bump lands, dependabot opens a separate PR for review.
    groups:
      dev:
        patterns: ["*"]
        update-types: ["minor", "patch"]
